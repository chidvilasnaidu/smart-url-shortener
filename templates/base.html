<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Snip — URL Shortener{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    /* ── Reset & Variables ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13141a;
      --surface2:  #1c1e27;
      --border:    rgba(255,255,255,.07);
      --accent:    #00e5ff;
      --accent2:   #ff6b6b;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --success:   #34d399;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --radius:    14px;
      --glow:      0 0 40px rgba(0,229,255,.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise grain overlay ───────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 999;
      opacity: .5;
    }

    /* ── Navigation ────────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(11,12,16,.85);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -.02em;
      display: flex; align-items: center; gap: .5rem;
    }

    .nav-logo span { color: var(--text); }

    .nav-links { display: flex; gap: .25rem; }

    .nav-link {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: .875rem;
      color: var(--muted);
      text-decoration: none;
      padding: .5rem 1rem;
      border-radius: 8px;
      transition: all .2s;
      display: flex; align-items: center; gap: .4rem;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-link.active { color: var(--accent); }

    /* ── Shared Utilities ──────────────────────────────────────────────── */
    .container { max-width: 860px; margin: 0 auto; padding: 0 2rem; }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .75rem 1.5rem;
      border: none; border-radius: 10px;
      font-family: var(--font-body);
      font-weight: 500; font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }

    .btn-accent {
      background: var(--accent);
      color: #0b0c10;
    }
    .btn-accent:hover {
      background: #33eaff;
      box-shadow: 0 0 24px rgba(0,229,255,.4);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.15); }

    .btn-danger {
      background: transparent;
      color: var(--accent2);
      border: 1px solid rgba(255,107,107,.2);
    }
    .btn-danger:hover {
      background: rgba(255,107,107,.1);
      border-color: var(--accent2);
    }

    /* ── Toast ─────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--success);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .875rem;
      padding: .85rem 1.25rem;
      border-radius: 10px;
      display: flex; align-items: center; gap: .6rem;
      transform: translateY(6rem);
      opacity: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast i { color: var(--success); font-size: 1rem; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><i class="bi bi-scissors"></i> <span>snip</span></a>
  <div class="nav-links">
    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/"><i class="bi bi-house"></i> Home</a>
    <a class="nav-link {% if request.endpoint == 'history' %}active{% endif %}" href="/history"><i class="bi bi-clock-history"></i> History</a>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Toast -->
<div id="toast"><i class="bi bi-check-circle-fill"></i> <span id="toast-msg"></span></div>

<script>
  function showToast(msg, color = 'var(--success)') {
    const t = document.getElementById('toast');
    const icon = t.querySelector('i');
    t.style.borderLeftColor = color;
    icon.style.color = color;
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
